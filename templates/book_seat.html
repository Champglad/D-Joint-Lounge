<!DOCTYPE html>
<html>
<head>
    <title>Book a Seat - D Joint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">D Joint Lounge</a>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="mb-4">Book a Seat for Match Viewing</h2>
        
        <form method="POST" class="col-md-6">
            <div class="mb-3">
                <label class="form-label">Your Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Select Seat</label>
                <select name="seat_id" class="form-select" required>
                    <option value="">Choose a seat...</option>
                    {% for seat in seats %}
                        <option value="{{ seat.id }}">
                            {{ seat.number }} - {{ seat.type|upper }} (₦{{ seat.price }})
                        </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Time</label>
                <input type="time" name="time" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Book Seat</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
