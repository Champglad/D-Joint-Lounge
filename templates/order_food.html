<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order - D Joint Lounge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
        }
        
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .order-container {
            max-width: 800px;
            margin: 100px auto 50px;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .order-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .order-header h2 {
            color: var(--primary);
            font-weight: 800;
        }
        
        .order-summary {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #dee2e6;
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .total-amount {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-align: right;
            margin-top: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: none;
        }
        
        .btn-order {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        
        .btn-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="order-container">
            <div class="order-header">
                <h2>Complete Your Order</h2>
                <p class="text-muted">Please provide your details to complete the order</p>
            </div>
            
            <!-- Order Summary -->
            <div class="order-summary">
                <h5 class="mb-3">Order Summary</h5>
                <div id="orderItems">
                    <!-- Items will be populated from cart -->
                </div>
                <div class="total-amount" id="totalAmount">₦0</div>
            </div>
            
            <!-- Order Form -->
            <form method="POST" id="orderForm">
                <div class="form-group">
                    <label class="form-label">Your Name *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Phone Number *</label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Order Type *</label>
                    <select name="order_type" class="form-select" required onchange="toggleTableNumber()">
                        <option value="dine_in">Dine In</option>
                        <option value="takeaway">Takeaway</option>
                    </select>
                </div>
                
                <div class="form-group" id="tableNumberGroup">
                    <label class="form-label">Table Number (Optional)</label>
                    <input type="text" name="table_number" class="form-control" placeholder="e.g., T12">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Special Instructions (Optional)</label>
                    <textarea name="instructions" class="form-control" rows="3" placeholder="Any special requests?"></textarea>
                </div>
                
                <!-- Hidden fields for cart items -->
                <div id="hiddenFields"></div>
                
                <button type="submit" class="btn-order">Place Order</button>
                <a href="/menu" class="btn btn-outline-secondary w-100 mt-2">Back to Menu</a>
            </form>
        </div>
    </div>
    
    <script>
        // Load cart from localStorage or URL parameters
        let cart = [];
        
        function loadCart() {
            // Try to get cart from URL parameters (if coming from menu)
            const urlParams = new URLSearchParams(window.location.search);
            const cartParam = urlParams.get('cart');
            
            if (cartParam) {
                cart = JSON.parse(decodeURIComponent(cartParam));
            } else {
                // Fallback to localStorage
                const savedCart = localStorage.getItem('orderCart');
                if (savedCart) {
                    cart = JSON.parse(savedCart);
                }
            }
            
            displayOrderSummary();
        }
        
        function displayOrderSummary() {
            const orderItemsDiv = document.getElementById('orderItems');
            const hiddenFieldsDiv = document.getElementById('hiddenFields');
            
            if (!cart || cart.length === 0) {
                orderItemsDiv.innerHTML = '<p class="text-muted">No items in cart</p>';
                document.getElementById('totalAmount').textContent = '₦0';
                window.location.href = '/menu';
                return;
            }
            
            let html = '';
            let total = 0;
            let hiddenFields = '';
            
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                
                html += `
                    <div class="order-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small class="text-muted">₦${item.price.toLocaleString()} x ${item.quantity}</small>
                        </div>
                        <span>₦${itemTotal.toLocaleString()}</span>
                    </div>
                `;
                
                // Add hidden fields for each item
                for (let i = 0; i < item.quantity; i++) {
                    hiddenFields += `
                        <input type="hidden" name="items[]" value="${item.id}">
                        <input type="hidden" name="quantities[]" value="1">
                        <input type="hidden" name="prices[]" value="${item.price}">
                    `;
                }
            });
            
            orderItemsDiv.innerHTML = html;
            document.getElementById('totalAmount').textContent = `₦${total.toLocaleString()}`;
            
            // Add total amount hidden field
            hiddenFields += `<input type="hidden" name="total_amount" value="${total}">`;
            hiddenFieldsDiv.innerHTML = hiddenFields;
        }
        
        function toggleTableNumber() {
            const orderType = document.querySelector('select[name="order_type"]').value;
            const tableGroup = document.getElementById('tableNumberGroup');
            
            if (orderType === 'takeaway') {
                tableGroup.style.display = 'none';
                document.querySelector('input[name="table_number"]').value = '';
            } else {
                tableGroup.style.display = 'block';
            }
        }
        
        // Load cart when page loads
        loadCart();
        toggleTableNumber();
    </script>
</body>
</html>
